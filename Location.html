    function render() {
        const tbody = document.getElementById('centerData');
        tbody.innerHTML = centers.map(c => {
            // गूगल मैप्स 'Directions' लिंक: यह दूरी और संभावित रास्ते दिखाता है
            const navUrl = "https://www.google.com/maps/dir/?api=1&destination=" + c.lat + "," + c.lng + "&travelmode=driving";
            
            return `
                <tr>
                    <td>${c.panchayat}</td>
                    <td><b>${c.name}</b><br><small>कोड: ${c.code}</small></td>
                    <td>${c.sevika}</td>
                    <td>${c.sector}</td>
                    <td><a href="tel:${c.mobile}" style="color:#075e54; font-weight:bold; text-decoration:none;">${c.mobile}</a></td>
                    <td><span class="coords">${c.lat}, ${c.lng}</span></td>
                    <td>
                        <button class="btn btn-map" onclick="viewMap(${c.lat}, ${c.lng}, '${c.name}')">मैप देखें</button>
                        <a href="${navUrl}" target="_blank" class="btn btn-nav">रास्ता देखें</a>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // इसी पेज में मिनी मैप लोड करने के लिए
    function viewMap(lat, lng, name) {
        const frame = document.getElementById('mapFrame');
        const section = document.getElementById('mapSection');
        // 'q' पैरामीटर पिन (Marker) दिखाता है
        const embedUrl = "https://google.com" + lat + "," + lng + "&hl=hi&z=15&output=embed";
        
        frame.src = embedUrl;
        document.getElementById('mapTitle').innerText = "केंद्र: " + name;
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });
    }

// १. फिक्स्ड मैप लोड (No IP error)
    function viewMap(lat, lng, name) {
        const frame = document.getElementById('mapFrame');
        // Proper structure: ://google.com
        const embedUrl = "https://www.google.com/maps?q=" + lat + "," + lng + "&hl=hi&z=15&output=embed";
        frame.src = embedUrl;
        document.getElementById('mapTitle').innerText = name;
        document.getElementById('mapSection').style.display = 'block';
    }
// २. व्हाट्सएप शेयर फीचर
    function shareWA(name, lat, lng) {
        const mapUrl = "https://www.google.com/maps?q=" + lat + "," + lng;
        const text = encodeURIComponent("केंद्र: " + name + "\nलोकेशन देखें: " + mapUrl);
        window.open("https://whatsapp.com" + text, "_blank");
    }


    // सर्च फंक्शन
    function filterTable() {
        const val = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#centerData tr");
        rows.forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }
